services:
  - type: web
    name: my-stock-webapp
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt -r webapp/backend/requirements.txt"
    startCommand: "python -m uvicorn main:app --host 0.0.0.0 --port $PORT --app-dir webapp/backend"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        value: ymt1001816-cyber/my-stock-app

  # 定時打 my-stock-webapp 自己的網址：一來避免免費方案閒置太久被 Render 關掉睡著，
  # 二來順便把持股/追蹤清單的報價快取「預先跑熱」（快取時間也設 10 分鐘，跟這個排程
  # 週期一致），這樣你實際打開 App 時幾乎都是直接吃現成快取，不用等 Yahoo Finance。
  - type: cron
    name: keep-alive-ping
    runtime: python
    plan: free
    schedule: "*/10 * * * *"
    buildCommand: "pip install requests"
    startCommand: "python -c \"import requests; base = 'https://my-stock-webapp.onrender.com'; [requests.get(base + p, timeout=60) for p in ('/api/holdings', '/api/watchlist')]\""
