services:
  - type: web
    name: my-stock-webapp
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt -r webapp/backend/requirements.txt"
    startCommand: "python -m uvicorn main:app --host 0.0.0.0 --port $PORT --app-dir webapp/backend"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        value: ymt1001816-cyber/my-stock-app

# Render 的 Cron Job 免費方案不支援（只有 Web Service 有免費方案），所以「定時打網址
# 預先跑熱快取／避免睡著」改用外部免費排程服務（例如 cron-job.org）打下面兩個網址，
# 不是用 Render 自己的 Cron Job：
#   https://my-stock-webapp.onrender.com/api/holdings
#   https://my-stock-webapp.onrender.com/api/watchlist
# 排程頻率設 10 分鐘一次，跟 market.py 裡報價快取的 600 秒（10 分鐘）一致。
