services:
  - type: web
    name: my-stock-webapp
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt -r webapp/backend/requirements.txt"
    startCommand: "python -m uvicorn main:app --host 0.0.0.0 --port $PORT --app-dir webapp/backend"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        value: ymt1001816-cyber/my-stock-app

  # 定時打 my-stock-webapp 自己的網址，避免免費方案閒置太久被 Render 關掉睡著
  - type: cron
    name: keep-alive-ping
    runtime: python
    plan: free
    schedule: "*/10 * * * *"
    buildCommand: "pip install requests"
    startCommand: "python -c \"import requests; requests.get('https://my-stock-webapp.onrender.com/api/config', timeout=30)\""
